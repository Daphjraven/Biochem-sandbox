<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMILES Molecule Sandbox</title>

  <!-- Load SmilesDrawer before the page script -->
  <script src="https://cdn.jsdelivr.net/npm/smiles-drawer@2.0.3/dist/smiles-drawer.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f6f7fb;
      color: #222;
    }

    h2 {
      margin: 0 0 10px 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    select,
    input,
    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #b8bfd0;
      font-size: 14px;
      background: white;
    }

    input {
      min-width: 280px;
    }

    button {
      cursor: pointer;
    }

    #board {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: 720px;
      border: 2px solid #2f3542;
      border-radius: 16px;
      background:
        linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
        #fcfcff;
      background-size: 24px 24px;
      overflow: hidden;
      user-select: none;
    }

    .piece {
      position: absolute;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: grab;
      user-select: none;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
      transition: box-shadow 0.15s ease;
    }

    .piece:active {
      cursor: grabbing;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
    }

    .molecule {
      background: white;
      border: 2px solid #444;
      width: 240px;
      min-height: 190px;
      text-align: center;
    }

    .mol-name {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .mol-note {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .mol-drawing {
      width: 200px;
      height: 120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .arrow {
      font-size: 54px;
      background: transparent;
      box-shadow: none;
      padding: 0;
      border: none;
      min-width: auto;
    }

    .label {
      background: #fff3bf;
      border: 1px solid #cfb75a;
      font-size: 14px;
    }

    .invalid-smiles {
      color: #b00020;
      font-size: 13px;
      padding: 8px;
    }

    .delete-hint,
    .footer-note {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <h2>🌸 Aromatic Ring Sandbox with SMILES</h2>

  <div class="toolbar">
    <label for="moleculeSelect"><strong>Select molecule:</strong></label>

    <select id="moleculeSelect">
      <option value="benzene">Benzene</option>
      <option value="toluene">Toluene</option>
      <option value="phenol">Phenol</option>
      <option value="aniline">Aniline</option>
      <option value="anisole">Anisole</option>
      <option value="benzoic_acid">Benzoic acid</option>
      <option value="chlorobenzene">Chlorobenzene</option>
      <option value="nitrobenzene">Nitrobenzene</option>
      <option value="bromobenzene">Bromobenzene</option>
      <option value="naphthalene">Naphthalene</option>
    </select>

    <button type="button" onclick="addSelectedMolecule()">Add Molecule</button>

    <input
      id="smilesInput"
      type="text"
      placeholder="Enter custom SMILES, e.g. c1ccccc1O"
    />

    <button type="button" onclick="addSmilesMolecule()">Add from SMILES</button>
    <button type="button" onclick="resetBoard()">Reset Board</button>
    <button type="button" onclick="clearAddedMolecules()">Clear Added Molecules</button>
  </div>

  <div id="board">
    <div
      class="piece molecule default-piece"
      id="default1"
      data-x="60"
      data-y="80"
      style="left:60px; top:80px;"
    >
      <div class="mol-name">Benzene</div>
      <div class="mol-note">c1ccccc1</div>
      <div class="mol-drawing">
        <canvas id="defaultDrawing1" width="200" height="120"></canvas>
      </div>
    </div>

    <div
      class="piece label default-piece"
      id="default2"
      data-x="340"
      data-y="100"
      style="left:340px; top:100px;"
    >
      electrophilic aromatic substitution sandbox
    </div>

    <div
      class="piece arrow default-piece"
      id="default3"
      data-x="420"
      data-y="220"
      style="left:420px; top:220px;"
    >
      ⟶
    </div>

    <div
      class="piece molecule default-piece"
      id="default4"
      data-x="650"
      data-y="80"
      style="left:650px; top:80px;"
    >
      <div class="mol-name">Bromobenzene</div>
      <div class="mol-note">Bromination example product</div>
      <div class="mol-drawing">
        <canvas id="defaultDrawing2" width="200" height="120"></canvas>
      </div>
    </div>
  </div>

  <div class="delete-hint">
    Double-click any added molecule to remove it.
  </div>

  <div class="footer-note">
    Type a SMILES string and drop the generated molecule onto the board.
  </div>

  <script>
    const board = document.getElementById("board");
    let activePiece = null;
    let offsetX = 0;
    let offsetY = 0;
    let addedCounter = 0;

    const moleculeLibrary = {
      benzene: {
        name: "Benzene",
        smiles: "c1ccccc1",
        note: "C6H6"
      },
      toluene: {
        name: "Toluene",
        smiles: "Cc1ccccc1",
        note: "methylbenzene"
      },
      phenol: {
        name: "Phenol",
        smiles: "c1ccccc1O",
        note: "hydroxybenzene"
      },
      aniline: {
        name: "Aniline",
        smiles: "Nc1ccccc1",
        note: "aminobenzene"
      },
      anisole: {
        name: "Anisole",
        smiles: "COc1ccccc1",
        note: "methoxybenzene"
      },
      benzoic_acid: {
        name: "Benzoic acid",
        smiles: "O=C(O)c1ccccc1",
        note: "aromatic carboxylic acid"
      },
      chlorobenzene: {
        name: "Chlorobenzene",
        smiles: "Clc1ccccc1",
        note: "aryl halide"
      },
      nitrobenzene: {
        name: "Nitrobenzene",
        smiles: "O=[N+]([O-])c1ccccc1",
        note: "deactivating group"
      },
      bromobenzene: {
        name: "Bromobenzene",
        smiles: "Brc1ccccc1",
        note: "aryl bromide"
      },
      naphthalene: {
        name: "Naphthalene",
        smiles: "c1ccc2ccccc2c1",
        note: "fused aromatic system"
      }
    };

    function makeDraggable(el) {
      el.addEventListener("mousedown", function (e) {
        activePiece = el;
        const rect = el.getBoundingClientRect();

        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        el.style.zIndex = String(Date.now()).slice(-6);
        e.preventDefault();
      });
    }

    function clampToBoard(el, x, y) {
      const maxX = board.clientWidth - el.offsetWidth;
      const maxY = board.clientHeight - el.offsetHeight;

      return {
        x: Math.max(0, Math.min(x, maxX)),
        y: Math.max(0, Math.min(y, maxY))
      };
    }

    document.addEventListener("mousemove", function (e) {
      if (!activePiece) return;

      const boardRect = board.getBoundingClientRect();
      const x = e.clientX - boardRect.left - offsetX;
      const y = e.clientY - boardRect.top - offsetY;
      const pos = clampToBoard(activePiece, x, y);

      activePiece.style.left = pos.x + "px";
      activePiece.style.top = pos.y + "px";
    });

    document.addEventListener("mouseup", function () {
      activePiece = null;
    });

    function renderSmilesToCanvas(canvasId, smiles) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      if (!window.SmilesDrawer) {
        const parent = canvas.parentElement;
        parent.innerHTML = `<div class="invalid-smiles">SmilesDrawer failed to load</div>`;
        return;
      }

      SmilesDrawer.parse(
        smiles,
        function (tree) {
          const drawer = new SmilesDrawer.Drawer({
            width: 200,
            height: 120,
            padding: 6
          });

          drawer.draw(tree, canvas, "light", false);
        },
        function () {
          const parent = canvas.parentElement;
          parent.innerHTML = `<div class="invalid-smiles">Invalid SMILES</div>`;
        }
      );
    }

    function createMoleculeCard(molecule, left = 140, top = 430) {
      addedCounter += 1;

      const canvasId = "canvas_added_" + addedCounter;
      const div = document.createElement("div");

      div.className = "piece molecule added-piece";
      div.id = "added_" + addedCounter;
      div.style.left = left + "px";
      div.style.top = top + "px";

      div.innerHTML = `
        <div class="mol-name">${molecule.name}</div>
        <div class="mol-note">${molecule.note || ""}</div>
        <div class="mol-note">${molecule.smiles}</div>
        <div class="mol-drawing">
          <canvas id="${canvasId}" width="200" height="120"></canvas>
        </div>
      `;

      div.addEventListener("dblclick", function () {
        div.remove();
      });

      board.appendChild(div);
      makeDraggable(div);
      renderSmilesToCanvas(canvasId, molecule.smiles);
    }

    function addSelectedMolecule() {
      const select = document.getElementById("moleculeSelect");
      const mol = moleculeLibrary[select.value];

      createMoleculeCard(
        mol,
        120 + (addedCounter % 5) * 45,
        420 + (addedCounter % 4) * 28
      );
    }

    function addSmilesMolecule() {
      const input = document.getElementById("smilesInput");
      const smiles = input.value.trim();

      if (!smiles) return;

      createMoleculeCard(
        {
          name: "Custom Molecule",
          smiles: smiles,
          note: "user-entered SMILES"
        },
        180 + (addedCounter % 4) * 40,
        440 + (addedCounter % 3) * 28
      );

      input.value = "";
    }

    function clearAddedMolecules() {
      document.querySelectorAll(".added-piece").forEach(function (el) {
        el.remove();
      });
    }

    function resetBoard() {
      document.querySelectorAll(".default-piece").forEach(function (el) {
        if (el.dataset.x && el.dataset.y) {
          el.style.left = el.dataset.x + "px";
          el.style.top = el.dataset.y + "px";
        }
      });

      clearAddedMolecules();
    }

    window.onload = function () {
      document.querySelectorAll(".piece").forEach(makeDraggable);
      renderSmilesToCanvas("defaultDrawing1", "c1ccccc1");
      renderSmilesToCanvas("defaultDrawing2", "Brc1ccccc1");
    };
  </script>
</body>
</html>
